device:
  name: 单兵边缘智能小脑模拟器
  form_factor: wearable_edge_server
  profile: production-sim
hardware:
  target_platform: NVIDIA Jetson Orin NX 16GB
  accelerator_tops: 157
  cpu_cores: 8
  memory_gb: 16
  storage_gb: 1024
  battery_wh: 60
  power_modes:
    - powersave
    - standard
    - performance
    - charging_batch
models:
  llm_primary: Qwen3.5-4B-INT4
  llm_fallback: Qwen3.5-2B-INT4
  llm_batch: Qwen3.5-9B-INT4
  context_tokens_default: 16384
  context_tokens_max: 32768
  vision:
    plate: HyperLPR3
    face_detection: OpenCV Zoo YuNet
    face_recognition: OpenCV Zoo SFace
    object: Ultralytics YOLO optional, simulated fallback
  asr: whisper.cpp local optional, external ASR optional, simulated fallback
streams:
  protocols:
    - rtsp
    - http
    - local_video_file
  max_sources_default: 2
  sample_fps_default: 1
  sample_fps_max: 5
  retained_frames_per_source: 120
reports:
  video_summary:
    structured_summary_default: true
    llm_polish_optional: true
    human_confirmation_required: true
evidence:
  sha256_manifest: true
  encrypt_by_default: true
sync:
  queue_enabled: true
  retry_required_for_production: true
linux_hardening:
  readonly_rootfs: true
  non_root_user: true
  package_manager_disabled_in_runtime: true
  ssh_enabled: false
  usb_automount_enabled: false
  desktop_environment: none
  secure_boot_required: true
  signed_ota_required: true
  model_signature_required: true
  mtls_required_for_production: true
