name: patrol-cerebellum

services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: patrol-cerebellum-llama
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      HF_HOME: /models/.cache/huggingface
    command:
      - --hf-repo
      - jc-builds/Qwen3.5-4B-Q4_K_M-GGUF
      - --hf-file
      - Qwen3.5-4B-Q4_K_M.gguf
      - --alias
      - Qwen3.5-4B-INT4
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - "16384"
      - -ngl
      - "99"
    ports:
      - "127.0.0.1:8089:8080"
    volumes:
      - ./models:/models
    pids_limit: 512
    mem_limit: 12g
    cpus: 8

  cerebellum:
    build:
      context: .
      dockerfile: Dockerfile
    image: patrol-cerebellum:dev
    container_name: patrol-cerebellum
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      HOME: /var/lib/cerebellum
      LD_LIBRARY_PATH: /opt/cerebellum/bin
      CEREBELLUM_DEVICE_ID: PL-CB-SIM-0001
      CEREBELLUM_PROFILE: production-sim
      CEREBELLUM_ACCELERATOR: jetson-orin-nx-16gb
      CEREBELLUM_LLM_MODEL: Qwen3.5-4B-INT4
      CEREBELLUM_LLM_FALLBACK_MODEL: Qwen3.5-2B-INT4
      CEREBELLUM_LLM_BATCH_MODEL: Qwen3.5-9B-INT4
      CEREBELLUM_CONTEXT_TOKENS: "16384"
      CEREBELLUM_MAX_CONTEXT_TOKENS: "32768"
      CEREBELLUM_STORAGE_GB: "1024"
      CEREBELLUM_BATTERY_WH: "60"
      CEREBELLUM_POWER_MODE: standard
      CEREBELLUM_SECURE_BOOT: "true"
      CEREBELLUM_READONLY_ROOTFS: "true"
      CEREBELLUM_LLM_BASE_URL: http://llama:8080/v1
      CEREBELLUM_LLM_TIMEOUT_SECONDS: "180"
      CEREBELLUM_API_KEY: ${CEREBELLUM_API_KEY:-}
      CEREBELLUM_ASR_MODEL: ${CEREBELLUM_ASR_MODEL:-sensevoice-int8}
      CEREBELLUM_ASR_BACKEND: ${CEREBELLUM_ASR_BACKEND:-sherpa-onnx-sensevoice}
      CEREBELLUM_ASR_BASE_URL: ${CEREBELLUM_ASR_BASE_URL:-}
      CEREBELLUM_ASR_LOCAL_BINARY: ${CEREBELLUM_ASR_LOCAL_BINARY:-/opt/cerebellum/bin/sherpa-onnx-offline}
      CEREBELLUM_ASR_MODEL_PATH: ${CEREBELLUM_ASR_MODEL_PATH:-/opt/cerebellum/models/asr/sensevoice-int8/model.int8.onnx}
      CEREBELLUM_ASR_TOKENS_PATH: ${CEREBELLUM_ASR_TOKENS_PATH:-/opt/cerebellum/models/asr/sensevoice-int8/tokens.txt}
      CEREBELLUM_ASR_TIMEOUT_SECONDS: ${CEREBELLUM_ASR_TIMEOUT_SECONDS:-180}
      CEREBELLUM_ASR_THREADS: ${CEREBELLUM_ASR_THREADS:-4}
      CEREBELLUM_OBJECT_MODEL: ${CEREBELLUM_OBJECT_MODEL:-yolov8n.pt}
      CEREBELLUM_SYNC_DESTINATION_URL: ${CEREBELLUM_SYNC_DESTINATION_URL:-}
      CEREBELLUM_BACKEND_BASE_URL: ${CEREBELLUM_BACKEND_BASE_URL:-http://host.docker.internal:8080}
      CEREBELLUM_BACKEND_TOKEN: ${CEREBELLUM_BACKEND_TOKEN:-patrollink-cerebellum-dev-token}
      CEREBELLUM_BACKEND_ALERT_REPORT_ENABLED: ${CEREBELLUM_BACKEND_ALERT_REPORT_ENABLED:-true}
      CEREBELLUM_FACE_LIBRARY_AUTO_SYNC: ${CEREBELLUM_FACE_LIBRARY_AUTO_SYNC:-true}
      CEREBELLUM_FACE_LIBRARY_SYNC_INTERVAL_SECONDS: ${CEREBELLUM_FACE_LIBRARY_SYNC_INTERVAL_SECONDS:-300}
      CEREBELLUM_FACE_MATCH_CONFIRM_FRAMES: ${CEREBELLUM_FACE_MATCH_CONFIRM_FRAMES:-3}
      CEREBELLUM_FACE_MATCH_WINDOW_SECONDS: ${CEREBELLUM_FACE_MATCH_WINDOW_SECONDS:-8}
      CEREBELLUM_FACE_MATCH_ALERT_COOLDOWN_SECONDS: ${CEREBELLUM_FACE_MATCH_ALERT_COOLDOWN_SECONDS:-30}
      CEREBELLUM_EVIDENCE_ENCRYPT_BY_DEFAULT: "true"
      CEREBELLUM_CERT_FILE: ${CEREBELLUM_CERT_FILE:-}
      CEREBELLUM_KEY_FILE: ${CEREBELLUM_KEY_FILE:-}
      CEREBELLUM_CA_FILE: ${CEREBELLUM_CA_FILE:-}
      CEREBELLUM_MTLS_REQUIRED: ${CEREBELLUM_MTLS_REQUIRED:-false}
    depends_on:
      - llama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      - cerebellum-data:/var/lib/cerebellum
      - cerebellum-logs:/var/log/cerebellum
      - ./tools/asr/bin:/opt/cerebellum/bin:ro
      - ./models:/opt/cerebellum/models:ro
      - ./samples:/var/lib/cerebellum/samples:ro
      - ./config/device.yaml:/etc/cerebellum/device.yaml:ro
    read_only: true
    tmpfs:
      - /tmp:size=256m,noexec,nosuid,nodev
      - /run:size=64m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 16g
    cpus: 8
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8088/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  cerebellum-data:
  cerebellum-logs:
